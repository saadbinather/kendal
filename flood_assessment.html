<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FloodSense Intelligence | Tactical Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=Noto+Nastaliq+Urdu:wght@700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #0a0a08;
        --paper: #111109;
        --surface: #17160e;
        --surface2: #1e1d12;
        --border: #2a2818;
        --border2: #3d3a1e;
        --amber: #d4860c;
        --amber-bright: #f0a020;
        --red-bright: #e84040;
        --green-bright: #3dba55;
        --text: #e8e0c0;
        --text-dim: #8a7e58;
        --text-muted: #4a4530;
      }
      body {
        background: var(--ink);
        color: var(--text);
        font-family: "IBM Plex Mono", monospace;
        min-height: 100vh;
        overflow-x: hidden;
      }
      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.4;
      }
      .scan {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.15) 2px,
          rgba(0, 0, 0, 0.15) 4px
        );
        opacity: 0.3;
      }
      .app {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 28px;
        position: relative;
        z-index: 2;
      }

      /* Header & Banners */
      .header {
        border-bottom: 1px solid var(--border2);
        padding-bottom: 20px;
        margin-bottom: 28px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
      }
      .wordmark {
        font-family: "Bebas Neue", sans-serif;
        font-size: 52px;
        color: var(--amber-bright);
        line-height: 1;
      }
      .sensor-banner {
        background: rgba(212, 134, 12, 0.06);
        border: 1px solid var(--amber-dim);
        border-left: 3px solid var(--amber);
        padding: 8px 14px;
        font-size: 10px;
        color: var(--amber);
        max-width: 400px;
        line-height: 1.6;
      }

      /* Grid Panels */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1.15fr;
        gap: 20px;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 2px solid var(--border2);
        padding: 24px;
      }
      .panel-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 13px;
        letter-spacing: 0.25em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
        margin-bottom: 22px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-title::before {
        content: "";
        width: 4px;
        height: 12px;
        background: var(--amber);
      }

      /* Inputs */
      .field {
        margin-bottom: 20px;
      }
      .label {
        display: block;
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 8px;
      }
      input,
      select {
        width: 100%;
        padding: 10px 12px;
        background: var(--surface2);
        border: 1px solid var(--border2);
        color: var(--text);
        font-family: "IBM Plex Mono";
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: var(--amber);
      }
      .cap-warn {
        color: var(--red-bright);
        font-size: 8px;
        margin-top: 4px;
        letter-spacing: 0.05em;
        font-weight: bold;
      }

      /* Ticks */
      .option-grid {
        display: flex;
        gap: 8px;
      }
      .tick {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border2);
        text-align: center;
        cursor: pointer;
        font-size: 11px;
        color: var(--text-muted);
        background: var(--surface2);
        transition: 0.2s;
      }
      .tick.on {
        border-color: var(--amber);
        color: var(--amber-bright);
        background: rgba(212, 134, 12, 0.07);
      }

      /* Risk Display */
      .risk-badge {
        padding: 28px 20px;
        margin-bottom: 20px;
        border-left: 4px solid;
        position: relative;
      }
      .risk-value {
        font-family: "Bebas Neue", sans-serif;
        font-size: 56px;
        line-height: 1;
      }
      .urdu {
        font-family: "Noto Nastaliq Urdu", serif;
        font-size: 22px;
        direction: rtl;
        margin-top: 12px;
        opacity: 0.75;
      }

      .Critical {
        color: var(--red-bright);
        border-color: var(--red-bright);
      }
      .High {
        color: #e07020;
        border-color: #e07020;
      }
      .Medium {
        color: var(--amber-bright);
        border-color: var(--amber-bright);
      }
      .Low {
        color: var(--green-bright);
        border-color: var(--green-bright);
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: var(--text-dim);
        margin-bottom: 6px;
        text-transform: uppercase;
      }
      .prob-track {
        height: 3px;
        background: var(--border2);
        margin-bottom: 12px;
      }
      .prob-fill {
        height: 100%;
        background: var(--amber);
        transition: 1s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* Binary Prediction Box */
      .binary-box {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #000;
        border: 1px solid var(--border2);
        padding: 12px;
        margin-bottom: 20px;
      }
      .binary-label {
        font-size: 10px;
        color: var(--text-dim);
      }
      .binary-value {
        font-size: 24px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }
      .binary-desc {
        font-size: 8px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
      }

      .confidence-tag {
        display: inline-block;
        padding: 4px 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border2);
        font-size: 11px;
        font-weight: 700;
        color: var(--amber-bright);
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="scan"></div>
    <div id="root"></div>

    <script>
      const { createElement: h, useState, useEffect } = React;
      const DISTRICTS = [
        "Nowshera",
        "Sindh District",
        "Balochistan District",
        "KP District",
        "Jacobabad",
      ];
      const URDU_RISK = {
        Critical: "انتہائی خطرناک",
        High: "زیادہ خطرہ",
        Medium: "معتدل خطرہ",
        Low: "کم خطرہ",
      };

      function App() {
        const [form, setForm] = useState({
          rainfall: "",
          date: new Date().toISOString().split("T")[0],
          district: "",
          soil: "Dry",
          water: "No",
        });
        const [data, setData] = useState(null);
        const [showCap, setShowCap] = useState(false);

        const handleRainfall = (val) => {
          let num = parseFloat(val);
          if (isNaN(num)) {
            setForm({ ...form, rainfall: "" });
            setShowCap(false);
          } else if (num > 400) {
            setForm({ ...form, rainfall: 400 });
            setShowCap(true);
          } else if (num < 0) {
            setForm({ ...form, rainfall: 0 });
            setShowCap(false);
          } else {
            setForm({ ...form, rainfall: val });
            setShowCap(false);
          }
        };

        useEffect(() => {
          if (form.rainfall !== "" && form.district) {
            const t = setTimeout(async () => {
              try {
                const res = await fetch("http://localhost:5000/predict", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(form),
                });
                setData(await res.json());
              } catch (e) {
                console.error("Backend Error.");
              }
            }, 500);
            return () => clearTimeout(t);
          }
        }, [form]);

        return h(
          "div",
          { className: "app" },
          h(
            "div",
            { className: "header" },
            h(
              "div",
              null,
              h(
                "div",
                { className: "wordmark" },
                "Flood",
                h("span", null, "Sense"),
              ),
              h(
                "div",
                {
                  style: {
                    fontSize: "10px",
                    color: "#4a4530",
                    letterSpacing: "0.2em",
                  },
                },
                "DISTRICT RISK INTELLIGENCE",
              ),
            ),
            h(
              "div",
              { className: "sensor-banner" },
              "SENSORS ONLINE — Jacobabad proxy calibrated (Scenario Card 2 Fixed)",
            ),
          ),

          h(
            "div",
            { className: "grid" },
            h(
              "div",
              { className: "panel" },
              h("div", { className: "panel-title" }, "Field Telemetry"),
              h(
                "div",
                { className: "field" },
                h(
                  "label",
                  { className: "label" },
                  "Rainfall Today (mm) [Range: 0-400]",
                ),
                h("input", {
                  type: "number",
                  value: form.rainfall,
                  placeholder: "e.g. 120",
                  onChange: (e) => handleRainfall(e.target.value),
                }),
                showCap &&
                  h(
                    "div",
                    { className: "cap-warn" },
                    "!! AUTO-CLAMPED: SYSTEM THRESHOLD MAX AT 400MM",
                  ),
              ),
              h(
                "div",
                { className: "field" },
                h("label", { className: "label" }, "District Location"),
                h(
                  "select",
                  {
                    value: form.district,
                    onChange: (e) =>
                      setForm({ ...form, district: e.target.value }),
                  },
                  h("option", { value: "" }, "Select location…"),
                  DISTRICTS.map((d) => h("option", { key: d, value: d }, d)),
                ),
              ),
              h(
                "div",
                { className: "field" },
                h("label", { className: "label" }, "Surface Saturation"),
                h(
                  "div",
                  { className: "option-grid" },
                  ["Dry", "Moist", "Saturated"].map((s) =>
                    h(
                      "div",
                      {
                        className: `tick${form.soil === s ? " on" : ""}`,
                        onClick: () => setForm({ ...form, soil: s }),
                      },
                      s,
                    ),
                  ),
                ),
              ),
              h(
                "div",
                { className: "field" },
                h("label", { className: "label" }, "Visible River Overflow"),
                h(
                  "div",
                  { className: "option-grid" },
                  ["No", "Yes"].map((w) =>
                    h(
                      "div",
                      {
                        className: `tick${form.water === w ? " on" : ""}`,
                        onClick: () => setForm({ ...form, water: w }),
                      },
                      w,
                    ),
                  ),
                ),
              ),
              h(
                "div",
                { className: "field" },
                h("label", { className: "label" }, "Simulation Date"),
                h("input", {
                  type: "date",
                  value: form.date,
                  onChange: (e) => setForm({ ...form, date: e.target.value }),
                }),
              ),
            ),

            h(
              "div",
              { className: "panel" },
              h("div", { className: "panel-title" }, "Inference Core Output"),
              data
                ? h(
                    "div",
                    null,
                    // Binary Output Box
                    h(
                      "div",
                      { className: "binary-box" },
                      h(
                        "div",
                        null,
                        h(
                          "div",
                          { className: "binary-label" },
                          "MODEL OUTPUT (flood_event)",
                        ),
                        h(
                          "div",
                          { className: "binary-desc" },
                          data.probability > 0.5
                            ? "POSITIVE DETECTION"
                            : "NEGATIVE DETECTION",
                        ),
                      ),
                      h(
                        "div",
                        { className: "binary-value" },
                        data.probability > 0.5 ? "1" : "0",
                      ),
                    ),

                    h(
                      "div",
                      { className: `risk-badge ${data.risk_level}` },
                      h(
                        "div",
                        {
                          style: {
                            fontSize: "9px",
                            opacity: 0.5,
                            letterSpacing: "0.2em",
                          },
                        },
                        "EVACUATION PRIORITY",
                      ),
                      h(
                        "div",
                        { className: "risk-value" },
                        data.risk_level.toUpperCase(),
                      ),
                      h(
                        "div",
                        { className: "urdu" },
                        URDU_RISK[data.risk_level],
                      ),
                    ),

                    h(
                      "div",
                      { className: "stat-row" },
                      h("span", null, "Model Probability"),
                      h(
                        "span",
                        null,
                        `${(data.probability * 100).toFixed(1)}%`,
                      ),
                    ),
                    h(
                      "div",
                      { className: "prob-track" },
                      h("div", {
                        className: "prob-fill",
                        style: { width: `${data.probability * 100}%` },
                      }),
                    ),

                    h(
                      "div",
                      { style: { marginBottom: "20px" } },
                      h("div", { className: "label" }, "System Confidence"),
                      h(
                        "div",
                        { className: "confidence-tag" },
                        `${data.confidence_pct}% CERTAINTY`,
                      ),
                    ),

                    h(
                      "div",
                      {
                        style: {
                          borderTop: "1px solid var(--border)",
                          paddingTop: "15px",
                        },
                      },
                      h(
                        "div",
                        { className: "label" },
                        "Estimated Population Exposed",
                      ),
                      h(
                        "div",
                        {
                          style: { fontSize: "32px", fontFamily: "Bebas Neue" },
                        },
                        data.population_at_risk.toLocaleString(),
                      ),
                      h(
                        "div",
                        { style: { fontSize: "9px", color: "#444" } },
                        "PEOPLE IN IMMEDIATE IMPACT ZONE",
                      ),
                    ),

                    data.historical_match !== null &&
                      h(
                        "div",
                        {
                          style: {
                            marginTop: "20px",
                            padding: "12px",
                            border: "1px solid #333",
                            fontSize: "10px",
                            color: "#888",
                          },
                        },
                        h(
                          "div",
                          {
                            style: {
                              color: "var(--red-bright)",
                              marginBottom: "4px",
                            },
                          },
                          "◆ HISTORICAL OVERLAY MATCHED",
                        ),
                        `Ground-truth event: ${data.historical_match === 1 ? "FLOOD (1)" : "SAFE (0)"}`,
                      ),
                  )
                : h(
                    "div",
                    {
                      style: {
                        textAlign: "center",
                        paddingTop: "100px",
                        color: "#333",
                      },
                    },
                    "AWAITING TELEMETRY...",
                  ),
            ),
          ),
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
