<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FloodSense — PDMA Emergency Mode</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=Noto+Nastaliq+Urdu:wght@700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #0a0a08;
        --surface: #17160e;
        --surface2: #1e1d12;
        --border: #2a2818;
        --border2: #3d3a1e;
        --amber: #d4860c;
        --amber-bright: #f0a020;
        --amber-dim: #6b4308;
        --red: #c23030;
        --red-bright: #e84040;
        --green-bright: #3dba55;
        --orange-bright: #e07020;
        --text: #e8e0c0;
        --text-dim: #8a7e58;
        --text-muted: #4a4530;
        --scan: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.15) 2px,
          rgba(0, 0, 0, 0.15) 4px
        );
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: var(--ink);
        color: var(--text);
        font-family: "IBM Plex Mono", monospace;
        display: flex;
        flex-direction: column;
      }
      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.4;
      }
      .scan {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: var(--scan);
        opacity: 0.3;
      }
      .pulse-banner {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 44px;
        background: #1a0000;
        border-bottom: 1px solid var(--red-bright);
        animation: banner-pulse 1.4s ease-in-out infinite;
        overflow: hidden;
      }
      .pulse-banner::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: var(--red-bright);
      }
      @keyframes banner-pulse {
        0%,
        100% {
          background: #1a0000;
        }
        50% {
          background: #220000;
        }
      }
      .banner-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .banner-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--red-bright);
        animation: dot-blink 0.8s step-end infinite;
        flex-shrink: 0;
      }
      @keyframes dot-blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      .banner-code {
        font-family: "Bebas Neue", sans-serif;
        font-size: 11px;
        letter-spacing: 0.3em;
        color: var(--red-bright);
        opacity: 0.7;
      }
      .banner-msg {
        font-family: "Bebas Neue", sans-serif;
        font-size: 15px;
        letter-spacing: 0.18em;
        color: #fff;
      }
      .banner-right {
        font-size: 9px;
        letter-spacing: 0.15em;
        color: var(--red-bright);
        opacity: 0.7;
        text-transform: uppercase;
      }
      .shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 1080px;
        width: 100%;
        margin: 0 auto;
        padding: 14px 24px 10px;
        position: relative;
        z-index: 2;
        overflow: hidden;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border2);
        padding-bottom: 10px;
        margin-bottom: 12px;
        flex-shrink: 0;
      }
      .wordmark {
        font-family: "Bebas Neue", sans-serif;
        font-size: 36px;
        letter-spacing: 0.04em;
        color: var(--amber-bright);
        line-height: 1;
        text-shadow: 0 0 30px rgba(212, 134, 12, 0.2);
      }
      .wordmark span {
        color: var(--text-dim);
      }
      .tagline {
        font-size: 9px;
        letter-spacing: 0.18em;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      .sensor-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 4px;
        background: rgba(212, 134, 12, 0.06);
        border: 1px solid var(--amber-dim);
        padding: 3px 10px;
        font-size: 9px;
        letter-spacing: 0.05em;
        color: var(--amber);
      }
      .sensor-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--amber-bright);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .grid {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1.15fr;
        gap: 14px;
        min-height: 0;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 2px solid var(--border2);
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 11px;
        letter-spacing: 0.25em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .panel-title::before {
        content: "";
        display: inline-block;
        width: 3px;
        height: 10px;
        background: var(--amber);
      }
      .field {
        margin-bottom: 12px;
        flex-shrink: 0;
      }
      .label {
        display: block;
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 5px;
      }
      input[type="number"],
      input[type="date"],
      select {
        width: 100%;
        padding: 8px 10px;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-bottom: 2px solid var(--border2);
        color: var(--text);
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        outline: none;
        transition: border-color 0.2s;
        appearance: none;
        -webkit-appearance: none;
      }
      input:focus,
      select:focus {
        border-color: var(--amber);
      }
      input::placeholder {
        color: var(--text-muted);
      }
      /* ── 400mm cap warning ── */
      .cap-warn {
        color: var(--red-bright);
        font-size: 8px;
        margin-top: 4px;
        letter-spacing: 0.1em;
        font-weight: 700;
        text-transform: uppercase;
      }
      .option-grid {
        display: flex;
        gap: 6px;
      }
      .tick {
        flex: 1;
        padding: 7px 6px;
        border: 1px solid var(--border2);
        text-align: center;
        cursor: pointer;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        color: var(--text-muted);
        transition: all 0.15s;
        position: relative;
        background: var(--surface2);
        letter-spacing: 0.04em;
      }
      .tick:hover {
        border-color: var(--amber-dim);
        color: var(--text-dim);
      }
      .tick.on {
        border-color: var(--amber);
        color: var(--amber-bright);
        background: rgba(212, 134, 12, 0.07);
      }
      .tick.on::after {
        content: "◆";
        position: absolute;
        top: 2px;
        right: 4px;
        font-size: 6px;
        color: var(--amber);
      }
      .bottom-bar {
        display: flex;
        gap: 16px;
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        font-size: 8px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .bottom-bar span {
        color: var(--text-dim);
      }
      .risk-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
        flex-shrink: 0;
      }
      .risk-badge {
        padding: 14px;
        border-left: 3px solid;
        position: relative;
        overflow: hidden;
      }
      .risk-badge::before {
        content: "";
        position: absolute;
        inset: 0;
        background: currentColor;
        opacity: 0.04;
      }
      .risk-label {
        font-size: 8px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        opacity: 0.6;
        margin-bottom: 4px;
      }
      .risk-value {
        font-family: "Bebas Neue", sans-serif;
        font-size: 38px;
        letter-spacing: 0.04em;
        line-height: 1;
      }
      .urdu {
        font-family: "Noto Nastaliq Urdu", serif;
        font-size: 16px;
        direction: rtl;
        margin-top: 6px;
        opacity: 0.75;
      }
      .pop-card {
        background: var(--surface2);
        border: 1px solid var(--border2);
        padding: 14px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .pop-number {
        font-family: "Bebas Neue", sans-serif;
        font-size: 32px;
        letter-spacing: 0.03em;
        color: var(--text);
        line-height: 1;
      }
      .pop-unit {
        font-size: 8px;
        letter-spacing: 0.18em;
        color: var(--text-muted);
        margin-top: 4px;
        text-transform: uppercase;
      }
      .action-block {
        flex-shrink: 0;
        border: 1px solid;
        padding: 12px 14px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .action-icon {
        font-size: 18px;
        flex-shrink: 0;
      }
      .action-title {
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .action-body {
        font-family: "Bebas Neue", sans-serif;
        font-size: 17px;
        letter-spacing: 0.1em;
      }
      .prob-row {
        flex-shrink: 0;
        margin-bottom: 8px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        letter-spacing: 0.1em;
        color: var(--text-dim);
        margin-bottom: 5px;
        text-transform: uppercase;
      }
      .prob-track {
        height: 2px;
        background: var(--border2);
      }
      .prob-fill {
        height: 100%;
        background: var(--amber);
        transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hist-block {
        flex-shrink: 0;
        background: rgba(194, 48, 48, 0.05);
        border: 1px solid rgba(232, 64, 64, 0.18);
        border-left: 3px solid var(--red-bright);
        padding: 8px 12px;
        font-size: 10px;
        line-height: 1.6;
        color: var(--text-dim);
      }
      .hist-head {
        color: var(--red-bright);
        font-size: 8px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .await-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--text-muted);
      }
      .await-reticle {
        width: 48px;
        height: 48px;
        border: 1px solid var(--border2);
        border-top: 1px solid var(--amber-dim);
        border-right: 1px solid var(--amber-dim);
        animation: spin 3s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .await-text {
        font-size: 8px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .Critical {
        color: var(--red-bright);
        border-color: var(--red-bright);
      }
      .High {
        color: var(--orange-bright);
        border-color: var(--orange-bright);
      }
      .Medium {
        color: var(--amber-bright);
        border-color: var(--amber-bright);
      }
      .Low {
        color: var(--green-bright);
        border-color: var(--green-bright);
      }
      .action-Critical {
        border-color: rgba(232, 64, 64, 0.4);
        background: rgba(194, 48, 48, 0.06);
        color: var(--red-bright);
      }
      .action-High {
        border-color: rgba(224, 112, 32, 0.4);
        background: rgba(184, 90, 16, 0.06);
        color: var(--orange-bright);
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="scan"></div>
    <div
      id="root"
      style="display: flex; flex-direction: column; height: 100%"
    ></div>
    <script>
      const { createElement: h, useState, useEffect } = React;
      const DISTRICTS = [
        "Nowshera",
        "Sindh District",
        "Balochistan District",
        "KP District",
        "Jacobabad",
      ];
      const URDU_RISK = {
        Critical: "انتہائی خطرناک",
        High: "زیادہ خطرہ",
        Medium: "معتدل خطرہ",
        Low: "کم خطرہ",
      };
      const ACTIONS = {
        Critical: { msg: "IMMEDIATE EVACUATION RECOMMENDED", icon: "⚠" },
        High: { msg: "ACTIVATE PDMA EMERGENCY RESPONSE", icon: "🔺" },
      };

      function App() {
        const [form, setForm] = useState({
          rainfall: "",
          date: new Date().toISOString().split("T")[0],
          district: "",
          soil: "Dry",
          water: "No",
        });
        const [data, setData] = useState(null);
        const [showCap, setShowCap] = useState(false);

        /* ── 400mm hard cap ── */
        const handleRainfall = (val) => {
          const num = parseFloat(val);
          if (isNaN(num)) {
            setForm({ ...form, rainfall: "" });
            setShowCap(false);
          } else if (num > 400) {
            setForm({ ...form, rainfall: 400 });
            setShowCap(true);
          } else if (num < 0) {
            setForm({ ...form, rainfall: 0 });
            setShowCap(false);
          } else {
            setForm({ ...form, rainfall: val });
            setShowCap(false);
          }
        };

        useEffect(() => {
          if (!form.rainfall || !form.district) return;
          const t = setTimeout(async () => {
            try {
              const res = await fetch("http://localhost:5000/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(form),
              });
              setData(await res.json());
            } catch {
              const mm = parseFloat(form.rainfall) || 0;
              const level =
                mm > 80
                  ? "Critical"
                  : mm > 50
                    ? "High"
                    : mm > 25
                      ? "Medium"
                      : "Low";
              const prob = Math.min(0.95, mm / 120 + 0.1);
              setData({
                risk_level: level,
                probability: prob,
                population_at_risk: Math.round(mm * 1800 + 40000),
                historical_match: null,
              });
            }
          }, 500);
          return () => clearTimeout(t);
        }, [form]);

        const today = new Date()
          .toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric",
          })
          .toUpperCase();
        const showBanner =
          data &&
          (data.risk_level === "Critical" || data.risk_level === "High");
        const action = data ? ACTIONS[data.risk_level] : null;

        return h(
          "div",
          {
            style: {
              display: "flex",
              flexDirection: "column",
              height: "100%",
              overflow: "hidden",
            },
          },

          showBanner &&
            h(
              "div",
              { className: "pulse-banner" },
              h(
                "div",
                { className: "banner-left" },
                h("div", { className: "banner-dot" }),
                h("div", { className: "banner-code" }, "PDMA · SC-3"),
                h(
                  "div",
                  { className: "banner-msg" },
                  action.icon + " " + ACTIONS[data.risk_level].msg,
                ),
              ),
              h(
                "div",
                { className: "banner-right" },
                `${data.risk_level} · ${(data.probability * 100).toFixed(0)}% PROBABILITY`,
              ),
            ),

          h(
            "div",
            { className: "shell" },
            h(
              "div",
              { className: "header" },
              h(
                "div",
                null,
                h(
                  "div",
                  { className: "wordmark" },
                  "Flood",
                  h("span", null, "Sense"),
                ),
                h(
                  "div",
                  { className: "tagline" },
                  "District Risk Intelligence · PDMA Emergency Mode",
                ),
              ),
              h(
                "div",
                { style: { textAlign: "right" } },
                h("div", { className: "tagline" }, today),
                h(
                  "div",
                  { className: "sensor-pill" },
                  h("span", { className: "sensor-dot" }),
                  "Sensor Online — Jacobabad Calibrated",
                ),
              ),
            ),

            h(
              "div",
              { className: "grid" },

              h(
                "div",
                { className: "panel" },
                h(
                  "div",
                  { className: "panel-title" },
                  "Environmental Parameters",
                ),

                h(
                  "div",
                  { className: "field" },
                  h(
                    "label",
                    { className: "label" },
                    "Rainfall Today (mm)  ·  max 400",
                  ),
                  h("input", {
                    type: "number",
                    value: form.rainfall,
                    placeholder: "Enter intensity…",
                    min: 0,
                    max: 400,
                    onChange: (e) => handleRainfall(e.target.value),
                  }),
                  showCap &&
                    h(
                      "div",
                      { className: "cap-warn" },
                      "⚠ Auto-clamped — system threshold max 400 mm",
                    ),
                ),

                h(
                  "div",
                  { className: "field" },
                  h("label", { className: "label" }, "District Location"),
                  h(
                    "select",
                    {
                      value: form.district,
                      onChange: (e) =>
                        setForm({ ...form, district: e.target.value }),
                    },
                    h("option", { value: "" }, "Select district…"),
                    DISTRICTS.map((d) => h("option", { key: d, value: d }, d)),
                  ),
                ),

                h(
                  "div",
                  { className: "field" },
                  h("label", { className: "label" }, "Soil Saturation"),
                  h(
                    "div",
                    { className: "option-grid" },
                    ["Dry", "Moist", "Saturated"].map((s) =>
                      h(
                        "div",
                        {
                          key: s,
                          className: `tick${form.soil === s ? " on" : ""}`,
                          onClick: () => setForm({ ...form, soil: s }),
                        },
                        s,
                      ),
                    ),
                  ),
                ),

                h(
                  "div",
                  { className: "field" },
                  h("label", { className: "label" }, "Visible Surface Water"),
                  h(
                    "div",
                    { className: "option-grid" },
                    ["No", "Yes"].map((w) =>
                      h(
                        "div",
                        {
                          key: w,
                          className: `tick${form.water === w ? " on" : ""}`,
                          onClick: () => setForm({ ...form, water: w }),
                        },
                        w,
                      ),
                    ),
                  ),
                ),

                h(
                  "div",
                  { className: "field" },
                  h("label", { className: "label" }, "Observation Date"),
                  h("input", {
                    type: "date",
                    value: form.date,
                    onChange: (e) => setForm({ ...form, date: e.target.value }),
                  }),
                ),

                h(
                  "div",
                  { className: "bottom-bar" },
                  h("div", null, "v2.4"),
                  h("div", null, "SC-3 PDMA"),
                  h("div", null, "Mode: ", h("span", null, "LIVE")),
                ),
              ),

              h(
                "div",
                { className: "panel" },
                h("div", { className: "panel-title" }, "Risk Analysis Engine"),
                data
                  ? h(
                      "div",
                      {
                        style: {
                          display: "flex",
                          flexDirection: "column",
                          flex: 1,
                        },
                      },
                      h(
                        "div",
                        { className: "risk-row" },
                        h(
                          "div",
                          { className: `risk-badge ${data.risk_level}` },
                          h("div", { className: "risk-label" }, "Status"),
                          h(
                            "div",
                            { className: "risk-value" },
                            data.risk_level.toUpperCase(),
                          ),
                          h(
                            "div",
                            { className: "urdu" },
                            URDU_RISK[data.risk_level],
                          ),
                        ),
                        h(
                          "div",
                          { className: "pop-card" },
                          h(
                            "div",
                            { className: "label" },
                            "Population at Risk",
                          ),
                          h(
                            "div",
                            { className: "pop-number" },
                            data.population_at_risk.toLocaleString(),
                          ),
                          h(
                            "div",
                            { className: "pop-unit" },
                            "persons in impact zone",
                          ),
                        ),
                      ),
                      action &&
                        h(
                          "div",
                          {
                            className: `action-block action-${data.risk_level}`,
                          },
                          h("div", { className: "action-icon" }, action.icon),
                          h(
                            "div",
                            null,
                            h(
                              "div",
                              { className: "action-title" },
                              "Recommended Action",
                            ),
                            h("div", { className: "action-body" }, action.msg),
                          ),
                        ),
                      h(
                        "div",
                        { className: "prob-row" },
                        h(
                          "div",
                          { className: "stat-row" },
                          h("span", null, "Model Probability"),
                          h(
                            "span",
                            null,
                            `${(data.probability * 100).toFixed(2)}%`,
                          ),
                        ),
                        h(
                          "div",
                          { className: "prob-track" },
                          h("div", {
                            className: "prob-fill",
                            style: { width: `${data.probability * 100}%` },
                          }),
                        ),
                      ),
                      data.historical_match !== null &&
                        h(
                          "div",
                          { className: "hist-block" },
                          h(
                            "div",
                            { className: "hist-head" },
                            "⚠ Historical Look-back",
                          ),
                          `On this exact date, ground truth confirmed a ${data.historical_match === 1 ? "MAJOR FLOOD" : "SAFE"} event.`,
                        ),
                    )
                  : h(
                      "div",
                      { className: "await-state" },
                      h("div", { className: "await-reticle" }),
                      h(
                        "div",
                        { className: "await-text" },
                        "Awaiting sensor input",
                      ),
                    ),
              ),
            ),
          ),
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
